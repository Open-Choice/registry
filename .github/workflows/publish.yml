name: Sign and publish manifest

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "plugins-pending/**"
      - "endpoints/**"
      - "scripts/**"
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: registry-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sign manifest
        env:
          OC_REGISTRY_KEY: ${{ secrets.OC_REGISTRY_KEY }}
        run: |
          if [ -n "${OC_REGISTRY_KEY:-}" ]; then
            node scripts/sign-manifest.js
          else
            echo "OC_REGISTRY_KEY not set - skipping CI signing."
            echo "manifest.json must be pre-signed locally before push."
          fi

      - name: Build site
        run: pnpm build

      - name: Stage manifest alongside pages
        run: cp manifest.json site/manifest.json

      - name: Commit regenerated manifest if changed
        run: |
          if ! git diff --quiet -- manifest.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add manifest.json
            git commit -m "Re-sign manifest.json"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
